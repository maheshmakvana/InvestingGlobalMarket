name: Fetch Forex News
on:
  repository_dispatch:
    types: [trigger-forex-news]        # fired by cron-job.org every 15 min
  schedule:
    - cron: '*/15 * * * *'             # fallback every 15 min if cron-job.org fails
  workflow_dispatch:

# Runs in the PUBLIC repo → minutos ilimitados (sin consumo de cuota privada).
# Scripts movidos desde el engine privado en auditoría 2026-03-31.

concurrency:
  group: forex-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser==6.0.11 requests==2.32.3 python-dateutil==2.9.0.post0 --break-system-packages

      - name: Create output directory
        run: mkdir -p news-data

      - name: Fetch news from RSS feeds
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit updated news data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data/news.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
            exit 0
          fi
          git commit -m "chore: fetch news [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          for i in 1 2 3; do
            git push && break
            echo "Push rechazado (intento $i) — rebasing..."
            git fetch origin main
            git rebase origin/main
          done
