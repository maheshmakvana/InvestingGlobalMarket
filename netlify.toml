# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — Configuración de despliegue para Netlify
# Alternativa: Si se usa Cloudflare Pages, las cabeceras se definen en _headers
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."

[[plugins]]
  package = "@netlify/plugin-lighthouse"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ── Cabeceras de seguridad globales ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self'
        'unsafe-inline'
        cdn.jsdelivr.net unpkg.com
        www.googletagmanager.com
        s3.tradingview.com widgets.tradingview-widget.com
        pagead2.googlesyndication.com partner.googleadservices.com tpc.googlesyndication.com;
      style-src 'self' 'unsafe-inline' fonts.googleapis.com s3.tradingview.com widgets.tradingview-widget.com;
      font-src fonts.gstatic.com;
      img-src 'self' data: https: flagcdn.com;
      connect-src 'self'
        https://globalinvesting.github.io https://api.frankfurter.app
        https://api.worldbank.org https://api.stlouisfed.org
        https://api.exchangerate-api.com https://open.er-api.com
        https://sdmx.oecd.org https://api.coingecko.com
        https://freeserv.dukascopy.com https://www.myfxbook.com
        https://www.google-analytics.com https://region1.google-analytics.com;
      frame-src googleads.g.doubleclick.net tpc.googlesyndication.com s3.tradingview.com widgets.tradingview-widget.com;
      frame-ancestors 'self';
      upgrade-insecure-requests
    """

# ── Cache para datos JSON dinámicos ──────────────────────────────────────────
[[headers]]
  for = "/economic-data/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

[[headers]]
  for = "/cot-data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

[[headers]]
  for = "/rates/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

[[headers]]
  for = "/ai-analysis/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=300"

[[headers]]
  for = "/extended-data/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

[[headers]]
  for = "/intraday-data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

[[headers]]
  for = "/news-data/*"
  [headers.values]
    Cache-Control = "public, max-age=1800, stale-while-revalidate=300"

[[headers]]
  for = "/sentiment-data/*"
  [headers.values]
    Cache-Control = "public, max-age=900, stale-while-revalidate=180"

[[headers]]
  for = "/meetings-data/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

[[headers]]
  for = "/fx-performance/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

[[headers]]
  for = "/calendar-data/*"
  [headers.values]
    Cache-Control = "public, max-age=7200, stale-while-revalidate=600"

# ── Assets estáticos — cache largo ───────────────────────────────────────────
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ── Redirects ─────────────────────────────────────────────────────────────────
[[redirects]]
  from = "http://globalinvesting.github.io/*"
  to = "https://globalinvesting.github.io/:splat"
  status = 301
  force = true
