<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… | ForexPulse Live Markets Terminal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #131722; --bg2: #1e222d; --bg3: #2a2e39;
    --border: #2a2e39; --border2: #363c4e;
    --text: #d1d4dc; --text2: #9096a0; --text3: #8290a0;
    --blue: #4f7fff; --head-bg: #1a1d29;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Topbar identical to site ── */
  #topbar {
    background: var(--head-bg);
    border-bottom: 1px solid var(--border);
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 10px;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    padding-right: 10px;
    border-right: 1px solid var(--border2);
    text-decoration: none; flex-shrink: 0;
  }
  .logo > span { display: flex; flex-direction: column; line-height: 1; }
  .logo-text { font-family: var(--font-ui); font-size: 11.5px; font-weight: 700; color: #fff; line-height: 1.1; }
  .logo-sub  { font-family: var(--font-ui); font-size: 8px; font-weight: 500; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; display: block; margin-top: 1px; }

  /* ── Main content ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    gap: 0;
  }

  .code-label {
    font-family: var(--font-mono);
    font-size: 72px;
    font-weight: 700;
    color: var(--border2);
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 1.5rem;
    user-select: none;
  }

  .box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem 2.5rem;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .box-label {
    font-size: 9px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: var(--blue); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .box-label::before, .box-label::after {
    content: ''; display: inline-block;
    width: 16px; height: 1px; background: var(--blue);
  }

  h1 {
    font-size: 15px; font-weight: 600;
    color: var(--text); margin-bottom: 8px;
  }
  p {
    font-size: 13px; color: var(--text2);
    line-height: 1.65; margin-bottom: 1.5rem;
  }

  #dest-label {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--blue);
    margin-bottom: 1.25rem;
    min-height: 16px;
    letter-spacing: .02em;
  }

  .bar-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 3px; overflow: hidden;
    margin-bottom: 1.5rem;
  }
  #bar {
    height: 100%; background: var(--blue);
    width: 0%; transition: width 0.08s linear;
  }

  a.btn {
    display: inline-block;
    padding: 7px 20px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 4px;
    font-size: 12px; font-weight: 500;
    font-family: var(--font-ui);
    text-decoration: none;
    transition: border-color .15s, color .15s;
  }
  a.btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── Statusbar identical to site ── */
  #statusbar {
    height: 22px; background: var(--head-bg);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 10px; gap: 16px;
    font-size: 10px; color: var(--text2);
    font-family: var(--font-ui);
  }
  .sb-k { color: var(--text3); font-weight: 700; letter-spacing: .04em; }
  .sb-v { color: var(--text2); font-family: var(--font-mono); font-size: 10px; }
  .footer-copy { font-size: 10px; color: var(--text3); white-space: nowrap; margin-left: auto; }
</style>
</head>
<body>

<header id="topbar">
  <a class="logo" href="/" title="ForexPulse Live Markets Terminal">
    <img src="/apple-touch-icon.png" alt="ForexPulse" style="width:28px;height:28px;border-radius:6px;flex-shrink:0;display:block;">
    <span>
      <span class="logo-text">ForexPulse</span>
      <span class="logo-sub">Live Markets Terminal</span>
    </span>
  </a>
</header>

<main>
  <div class="code-label">404</div>
  <div class="box">
    <div class="box-label">Page moved</div>
    <h1>This URL no longer exists</h1>
    <p>You'll be redirected automatically to the updated page.</p>
    <div id="dest-label">→ detecting destination…</div>
    <div class="bar-wrap"><div id="bar"></div></div>
    <a class="btn" id="go-btn" href="/">Go now</a>
  </div>
</main>

<footer id="statusbar">
  <div style="display:flex;gap:4px;"><span class="sb-k">PAGE</span><span class="sb-v">404</span></div>
  <div class="footer-copy">© 2026 Mahesh Makwana · ForexPulse. All rights reserved.</div>
</footer>

<script>
  const redirects = {
    "news.html":                    "index.html",
    "en.html":                      "index.html",
    "guia-cot.html":                "guide-cot.html",
    "tecnico-vs-fundamental.html":  "guide-dashboard.html",
  };

  const path = window.location.pathname.replace(/^\//, "").replace(/\/$/, "");
  const filename = path.split("/").pop() || "";
  const dest = redirects[filename] || redirects[path] || "index.html";
  const destUrl = "/" + dest;

  document.getElementById("dest-label").textContent = "→ " + destUrl;
  document.getElementById("go-btn").href = destUrl;

  let pct = 0;
  const bar = document.getElementById("bar");
  const interval = setInterval(() => {
    pct += 2;
    bar.style.width = pct + "%";
    if (pct >= 100) {
      clearInterval(interval);
      window.location.replace(destUrl);
    }
  }, 60);
</script>

</body>
</html>
